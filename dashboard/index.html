<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket League Match Tracker</title>
<style>
:root{--bg-primary:#09090f;--bg-secondary:#131320;--bg-card:#1a1a2e;--bg-card-hover:#1f1f38;--bg-input:#0f0f1a;--text-primary:#e8ecf1;--text-secondary:#94a3b8;--text-muted:#5c6a7d;--border:#252538;--border-active:#818cf8;--blue:#4FC3F7;--blue-glow:rgba(79,195,247,0.15);--orange:#FF6B35;--orange-glow:rgba(255,107,53,0.15);--green:#4ade80;--green-glow:rgba(74,222,128,0.12);--red:#f87171;--red-glow:rgba(248,113,113,0.12);--radius:14px;--radius-sm:10px;--shadow:0 8px 32px rgba(0,0,0,0.4);--transition:0.25s cubic-bezier(0.4,0,0.2,1);--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg-primary);background-image:url('fons.jpg'),radial-gradient(ellipse at 60% 0%,var(--blue-glow)0%,transparent 50%),radial-gradient(ellipse at 40% 100%,var(--orange-glow)0%,transparent 50%);background-size:cover;background-position:center;background-attachment:fixed;background-blend-mode:overlay;color:var(--text-primary);min-height:100vh;padding:0 20px 40px}
.listener-bar{text-align:center;padding:6px 16px;font-size:.75rem;font-weight:600;border-bottom:1px solid var(--border);background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;gap:8px}
.listener-bar .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse-dot 2s ease-in-out infinite}
.dot-connecting{background:#fbbf24;box-shadow:0 0 6px #fbbf24;animation:pulse-dot 1s ease-in-out infinite}
.dot-off{background:var(--text-muted)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.settings-toggle{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);font-size:1.2rem;cursor:pointer;z-index:50;transition:all var(--transition);display:flex;align-items:center;justify-content:center}
.settings-toggle:hover{color:var(--text-primary);border-color:var(--text-muted);transform:scale(1.05)}
.exit-btn{position:fixed;bottom:24px;right:80px;width:44px;height:44px;border-radius:50%;background:var(--bg-card);border:1px solid rgba(248,113,113,0.3);color:var(--red);font-size:1.2rem;cursor:pointer;z-index:50;transition:all var(--transition);display:flex;align-items:center;justify-content:center}
.exit-btn:hover{background:var(--red-glow);border-color:var(--red);transform:scale(1.1);box-shadow:0 0 12px rgba(248,113,113,0.3)}
.header{text-align:center;padding:40px 0 20px}
.header-logo{width:48px;height:48px;vertical-align:middle;margin-right:10px;margin-bottom:6px;filter:drop-shadow(0 0 8px rgba(255,107,53,0.3))}
.header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;display:inline-block;vertical-align:middle}
.header .subtitle{color:var(--text-muted);font-size:.88rem}
.header .version{color:var(--text-muted);font-size:.68rem;margin-top:4px;opacity:.6}
.nav{display:flex;justify-content:center;gap:4px;margin:0 auto 32px;max-width:500px;background:var(--bg-card);border:1px solid var(--border);border-radius:50px;padding:4px}
.nav-btn{flex:1;padding:10px 18px;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-size:.88rem;font-weight:600;background:transparent;color:var(--text-muted);transition:all var(--transition)}
.nav-btn:hover{color:var(--text-primary)}
.nav-btn.active{background:linear-gradient(135deg,#6366f1,#818cf8);color:white;box-shadow:0 2px 12px rgba(99,102,241,0.25)}
.container{max-width:700px;margin:0 auto}.panel{display:none}.panel.active{display:block}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;animation:cardIn .35s ease backwards}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card.win-card{border-left:4px solid var(--green)}.card.loss-card{border-left:4px solid var(--red)}
.session-card{cursor:pointer}.session-card:hover{background:var(--bg-card-hover);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.3)}
.btn{padding:8px 18px;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-size:.82rem;font-weight:600;transition:all var(--transition)}
.btn-primary{background:linear-gradient(135deg,#6366f1,#818cf8);color:white}.btn-primary:hover{box-shadow:0 4px 16px rgba(99,102,241,0.3);transform:translateY(-1px)}
.btn-danger{background:var(--red-glow);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.btn-ghost{background:transparent;color:var(--text-muted)}.btn-ghost:hover{color:var(--text-primary)}
.input{width:100%;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:.88rem;outline:none}.input:focus{border-color:var(--border-active)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:460px;width:90%}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-muted);gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--border-active);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.match-row{cursor:pointer;flex-wrap:wrap}.match-row:hover{background:rgba(255,255,255,0.03)}.match-row .match-detail-popup{flex-basis:100%;order:99}.match-detail-popup{display:none;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-top:8px;width:100%;min-width:100%}.match-detail-popup.show{display:block;animation:cardIn .25s ease}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.stat-card h4{color:var(--text-muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-card .big-number{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--blue),#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.winrate-bar{margin-top:10px;height:6px;border-radius:3px;background:var(--red-glow);overflow:hidden}
.winrate-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),#22c55e);transition:width .6s}
.recent-form{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.form-dot{width:28px;height:28px;border-radius:50%;font-size:.65rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.form-dot.win{background:var(--green-glow);color:var(--green);border:1px solid rgba(74,222,128,0.3)}
.form-dot.loss{background:var(--red-glow);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
.form-dot.placeholder{background:rgba(255,255,255,0.03);border:1px dashed var(--border);color:transparent}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);border-radius:50px;padding:10px 24px;font-size:.85rem;font-weight:600;z-index:200;animation:toastIn .3s ease;box-shadow:var(--shadow)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.deep-section{margin-top:24px}
.deep-section h3{color:var(--text-secondary);font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.deep-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.metric-card{background:var(--bg-input);border-radius:var(--radius-sm);padding:14px;text-align:center}
.metric-card .metric-value{font-size:1.3rem;font-weight:700}
.metric-card .metric-label{font-size:.7rem;color:var(--text-muted);margin-top:2px}
.metric-card.orange .metric-value{color:var(--orange)}
.metric-card.blue .metric-value{color:var(--blue)}
.metric-card.green .metric-value{color:var(--green)}
.metric-card.red .metric-value{color:var(--red)}
.metric-bar{height:4px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
.metric-bar-fill{height:100%;border-radius:2px}
.session-badge{font-size:.7rem;padding:2px 8px;border-radius:50px;background:var(--bg-input)}
.session-badge.badge-active{color:var(--green)}.session-badge.badge-completed{color:var(--text-muted)}
</style>
</head>
<body>

<div class="listener-bar"><div class="dot dot-off" id="listener-dot"></div><span id="listener-msg">Auto-tracker: not running</span></div>

<div class="header"><img src="logo.png" class="header-logo" alt="RL Tracker"><h1>Rocket League Match Tracker</h1><p class="subtitle">Track your competitive grind</p><p class="version">RL Tracker 2.0.0-dev</p></div>

<nav class="nav"><button class="nav-btn active" data-tab="active-session">🎮 Active Session</button><button class="nav-btn" data-tab="history">📋 History</button><button class="nav-btn" data-tab="stats">📊 Stats</button></nav>

<div class="container">
<div class="panel active" id="panel-active-session"><div id="active-content"><div class="loading"><div class="spinner"></div>Loading...</div></div></div>
<div class="panel" id="panel-history"><div id="history-content"><div class="loading"><div class="spinner"></div>Loading...</div></div></div>
<div class="panel" id="panel-stats"><div id="stats-content"><div class="loading"><div class="spinner"></div>Loading stats...</div></div></div>
</div>

<div id="toast-container"></div>
<button class="settings-toggle" onclick="toggleSettings()" title="Settings">⚙️</button>
<button class="exit-btn" onclick="exitTracker()" title="Exit Tracker">⏻</button>

<div class="modal-overlay" id="settings-modal" style="display:none"><div class="modal">
<h3 style="margin-bottom:16px">⚙️ Auto-Tracker Settings</h3>
<label style="display:block;color:var(--text-secondary);font-size:.82rem;margin-bottom:4px">Your Rocket League Name</label>
<input type="text" class="input" id="cfg-player-name" placeholder="e.g. Magnifico" style="margin-bottom:14px">
<label style="display:block;color:var(--text-secondary);font-size:.82rem;margin-bottom:4px">Friend Names (one per line)</label>
<textarea class="input" id="cfg-friends" rows="3" style="margin-bottom:14px;resize:vertical"></textarea>
<p style="color:var(--text-muted);font-size:.72rem;margin-bottom:14px">Tracker auto-detects matches when RL is running.<br>Make sure <b>TAStatsAPI.ini</b> is set up.</p>
<div style="background:var(--bg-input);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:.82rem;font-weight:600">🔧 RL Stats API Config</span><span id="rl-config-badge" style="font-size:.7rem;padding:2px 8px;border-radius:50px;background:var(--bg-card)">Checking...</span></div>
<p id="rl-config-msg" style="font-size:.72rem;color:var(--text-secondary);margin-bottom:8px"></p>
<div style="display:flex;gap:6px"><button class="btn btn-ghost" onclick="checkRlConfig()" style="font-size:.72rem">🔄 Check</button><button class="btn btn-primary" onclick="createRlConfig()" style="font-size:.72rem">📝 Auto-Create</button></div></div>
<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-ghost" onclick="toggleSettings()">Cancel</button><button class="btn btn-primary" onclick="saveSettings()">💾 Save</button></div></div></div>

<script>
let activeSessionId=null,activeSession=null,listenerPollInterval=null,listenerState='not_running';
async function api(url,opts={}){try{const r=await fetch(url,{headers:{'Content-Type':'application/json',...opts.headers},...opts});const d=await r.json();if(!r.ok)throw new Error(d.error||`HTTP ${r.status}`);return d}catch(e){if(e.message.includes('Failed to fetch'))throw new Error('Server not reachable');throw e}}
function showToast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.getElementById('toast-container').appendChild(e);setTimeout(()=>e.remove(),3000)}
function formatDate(iso){const d=new Date(iso);return d.toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
function relativeTime(iso){const d=new Date(iso),n=new Date(),diff=Math.floor((n-d)/1000);if(diff<60)return'just now';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}

document.querySelectorAll('.nav-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+b.dataset.tab).classList.add('active');if(b.dataset.tab==='active-session')loadActiveSession();if(b.dataset.tab==='history')loadHistory();if(b.dataset.tab==='stats')loadStats()})});

// ====== Active Session (AUTO-TRACK ONLY - no manual input) ======
async function loadActiveSession(){const c=document.getElementById('active-content');c.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';try{const ss=await api('/api/sessions');const a=ss.find(s=>s.status==='active');if(a){activeSessionId=a.id;const f=await api('/api/sessions/'+a.id);activeSession=f;renderActiveSession(f)}else{activeSessionId=null;activeSession=null;c.innerHTML='<div class="card" style="text-align:center"><h3 style="margin-bottom:12px">No active session</h3><p style="color:var(--text-muted);margin-bottom:16px">The listener auto-creates sessions when matches are detected.<br>Enter your RL name in Settings and start playing!</p><p style="font-size:.7rem;color:var(--text-muted);margin-top:24px">⏻ Exit button — bottom right, next to ⚙️</p></div>'}}catch(e){c.innerHTML='<div class="empty-state"><p>Error: '+e.message+'</p></div>'}}

function renderActiveSession(s){const ms=s.matches||[],w=s.wins||0,l=s.losses||0,t=w+l;let h='<div class="card '+(w>=l?'win-card':'loss-card')+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><h3 style="font-size:1.1rem">🎮 Active Session</h3><span style="color:var(--text-muted);font-size:.8rem">'+formatDate(s.started_at)+' · '+s.mode+(s.friend_name?' w/ '+s.friend_name:'')+'</span></div><button class="btn btn-danger" onclick="endSession()">End Session</button></div>';if(t>0){h+='<div style="text-align:center;margin-bottom:12px"><span style="color:var(--green);font-size:1.4rem;font-weight:800">🏆 '+w+'W</span> <span style="color:var(--text-muted);margin:0 8px">·</span> <span style="color:var(--red);font-size:1.4rem;font-weight:800">💀 '+l+'L</span> <span style="color:var(--text-muted);margin:0 8px">·</span> <span style="font-weight:700">'+(t>0?Math.round(w/t*100):0)+'%</span></div>';h+=ms.map(m=>'<div class="match-row" onclick="event.stopPropagation();toggleMatchDetail('+m.id+',this)" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--border)"><span style="font-weight:600">Match</span><span style="font-size:1.1rem;font-weight:700">'+m.user_score+' - '+m.opponent_score+'</span><span style="color:'+(m.result==='win'?'var(--green)':'var(--red)')+';font-weight:600">'+m.result.toUpperCase()+'</span>'+'<div class="match-detail-popup"></div></div>').join('')+'<p style="text-align:center;margin-top:12px;font-size:.7rem;color:var(--text-muted)">Matches are tracked automatically — play and they appear</p>'}else{h+='<div class="empty-state" style="padding:20px"><p>No matches yet. Play a game!</p></div>'}h+='</div>';document.getElementById('active-content').innerHTML=h}

async function endSession(){if(!confirm('End this session?'))return;try{await api('/api/sessions/'+activeSessionId+'/end',{method:'POST'});showToast('Session ended! '+activeSession.wins+'W - '+activeSession.losses+'L');activeSessionId=null;activeSession=null;loadActiveSession()}catch(e){showToast('❌ '+e.message)}}

// ====== History ======
async function loadHistory(){const c=document.getElementById('history-content');c.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';try{const ss=await api('/api/sessions');if(!ss.length){c.innerHTML='<div class="empty-state"><h3>📋 No sessions yet</h3><p>Play some Rocket League!</p></div>';return}c.innerHTML=ss.map(s=>{const w=s.wins||0,l=s.losses||0,t=w+l,wr=t>0?Math.round(w/t*100):0,accent=t>0&&w>=l?'var(--green)':t>0?'var(--red)':'var(--border-active)';return'<div class="card session-card" id="session-'+s.id+'" style="border-left:4px solid '+accent+'"><div style="display:flex;justify-content:space-between;align-items:center"><span>'+formatDate(s.started_at)+'</span><div style="display:flex;gap:6px;align-items:center"><span class="session-badge '+(s.mode==='duo'?'':'')+'">'+(s.mode==='duo'?'👥 Duo'+(s.friend_name?' w/ '+s.friend_name:''):'🧑 Solo')+'</span><span class="session-badge '+(s.status==='active'?'badge-active':'badge-completed')+'">'+(s.status==='active'?'● Live':'✓ Done')+'</span></div></div><div style="display:flex;gap:16px;margin-top:10px;font-size:.85rem"><span>Matches: <b>'+t+'</b></span>'+(t>0?'<span style="color:var(--green)">🏆 '+w+'W</span><span style="color:var(--red)">💀 '+l+'L</span><span style="color:'+(wr>=50?'var(--green)':'var(--red)')+'">'+wr+'%</span>':'<span style="color:var(--text-muted)">No matches</span>')+'</div><div class="session-expand" id="expand-'+s.id+'"></div></div>'}).join('');ss.forEach(s=>{const card=document.getElementById('session-'+s.id);if(card)card.addEventListener('click',async e=>{if(e.target.closest('button'))return;await toggleSessionExpand(s.id)})})}catch(e){c.innerHTML='<div class="empty-state"><p>Error: '+e.message+'</p></div>'}}

async function toggleSessionExpand(sid){const e=document.getElementById('expand-'+sid);if(e.classList.contains('open')){e.classList.remove('open');e.innerHTML='';return}document.querySelectorAll('.session-expand.open').forEach(el=>{el.classList.remove('open');el.innerHTML=''});e.classList.add('open');e.innerHTML='<div class="loading" style="padding:12px"><div class="spinner"></div></div>';try{const s=await api('/api/sessions/'+sid),ms=s.matches||[];let h=ms.length===0?'<p style="color:var(--text-muted);text-align:center;padding:12px">No matches in this session</p>':'<div style="margin-top:8px">'+ms.map((m,i)=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border)"><span>Match '+(i+1)+'</span><span>'+m.user_score+' - '+m.opponent_score+'</span><span style="color:'+(m.result==='win'?'var(--green)':'var(--red)')+'">'+m.result.toUpperCase()+'</span>'+'<div class="match-detail-popup"></div></div>').join('')+'</div>';h+='<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px"><button class="btn btn-danger" onclick="event.stopPropagation();deleteSession('+sid+')">🗑️ Delete Session</button></div>';e.innerHTML=h}catch(err){e.innerHTML='<p style="color:var(--red);padding:12px">Error: '+err.message+'</p>'}}
async function deleteSession(sid){if(!confirm('Delete this entire session?'))return;try{await api('/api/sessions/'+sid,{method:'DELETE'});showToast('🗑️ Session deleted');if(activeSessionId===sid){activeSessionId=null;activeSession=null}loadHistory()}catch(e){showToast('❌ '+e.message)}}

// ====== Stats (FULL with deep stats) ======
async function loadStats(){const c=document.getElementById('stats-content');c.innerHTML='<div class="loading"><div class="spinner"></div>Loading stats...</div>';try{const s=await api('/api/stats'),t=s.overall.total||0;if(!t){c.innerHTML='<div class="empty-state"><h3>📊 No stats yet</h3><p>Play some matches and they will show up here!</p></div>';return}const owr=Math.round(s.overall.wins/t*100),swr=s.solo.total>0?Math.round(s.solo.wins/s.solo.total*100):0,dwr=s.duo.total>0?Math.round(s.duo.wins/s.duo.total*100):0;const recentHtml=s.recent.length>0?s.recent.map(m=>'<div class="form-dot '+m.result+'">'+(m.result==='win'?'W':'L')+'</div>').join(''):'';const padCount=20-s.recent.length;const paddedRecent=recentHtml+'<div class="form-dot placeholder">-</div>'.repeat(Math.max(0,padCount));let duoHtml='';if(s.duo_by_friend&&s.duo_by_friend.length>0){duoHtml='<h4 style="color:var(--text-muted);text-transform:uppercase;font-size:.75rem;letter-spacing:.06em;margin:24px 0 8px">👥 Duo Partners</h4>'+s.duo_by_friend.map(f=>{const fwr=f.total>0?Math.round(f.wins/f.total*100):0;return'<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px"><span style="font-weight:600">'+f.friend_name+'</span><span style="font-size:.8rem;color:var(--text-secondary)">🏆 '+f.wins+'W 💀 '+f.losses+'L · '+fwr+'% · '+f.total+' games</span></div>'}).join('')}c.innerHTML='<div class="stat-card" style="border-left:4px solid '+(owr>=50?'var(--green)':'var(--red)')+';margin-bottom:16px"><h4>Overall</h4><div class="big-number">'+owr+'%</div><div style="color:var(--text-secondary);font-size:.8rem">🏆 '+s.overall.wins+'W · 💀 '+s.overall.losses+'L · '+t+' total</div><div class="winrate-bar"><div class="winrate-fill" style="width:'+owr+'%"></div></div></div><div class="card" style="text-align:center;margin-bottom:16px"><h4 style="color:var(--text-muted);text-transform:uppercase;font-size:.75rem;letter-spacing:.06em;margin-bottom:8px">Recent Form</h4><div class="recent-form">'+paddedRecent+'</div></div><div class="stats-grid"><div class="stat-card win-card"><h4>🧑 Solo</h4><div class="big-number">'+swr+'%</div><div style="color:var(--text-secondary);font-size:.8rem">'+(s.solo.wins||0)+'W · '+(s.solo.losses||0)+'L · '+(s.solo.total||0)+' games</div><div class="winrate-bar"><div class="winrate-fill" style="width:'+swr+'%"></div></div></div><div class="stat-card"><h4>👥 Duo</h4><div class="big-number">'+dwr+'%</div><div style="color:var(--text-secondary);font-size:.8rem">'+(s.duo.wins||0)+'W · '+(s.duo.losses||0)+'L · '+(s.duo.total||0)+' games</div><div class="winrate-bar"><div class="winrate-fill" style="width:'+dwr+'%"></div></div></div></div><div class="stat-card" style="margin-top:14px"><h4>📋 Sessions</h4><div class="big-number">'+s.sessions.completed+'</div><div style="color:var(--text-secondary);font-size:.8rem">completed · '+Math.round(t/Math.max(1,s.sessions.completed))+' avg matches/session</div></div>'+duoHtml+'<div id="deep-stats-container"></div>';loadDeepStats()}catch(e){c.innerHTML='<div class="empty-state"><p>Error: '+e.message+'</p></div>'}}

async function loadDeepStats(){const c=document.getElementById('deep-stats-container');if(!c)return;try{const deep=await api('/api/stats/deep'),a=deep.aggregates||{};if(!a.total_matches){c.innerHTML='';return}const sa=a.shot_accuracy||0,fg=a.all_time_fastest_goal||0,asp=a.overall_avg_shot_power||0,ot=a.total_overtime||0;c.innerHTML='<div class="deep-section"><h3>🎯 Shot Power & Accuracy</h3><div class="deep-metrics"><div class="metric-card orange"><div class="metric-value">'+(fg>0?fg+' km/h':'—')+'</div><div class="metric-label">Fastest Goal</div></div><div class="metric-card blue"><div class="metric-value">'+(asp>0?asp+' km/h':'—')+'</div><div class="metric-label">Avg Shot Power</div></div><div class="metric-card green"><div class="metric-value">'+sa+'%</div><div class="metric-label">Shot Accuracy</div><div class="metric-bar"><div class="metric-bar-fill" style="width:'+sa+'%;background:var(--green)"></div></div></div><div class="metric-card"><div class="metric-value">'+(a.total_shots||0)+'</div><div class="metric-label">Total Shots</div></div></div></div><div class="deep-section"><h3>⛽ Movement & Boost</h3><div class="deep-metrics"><div class="metric-card blue"><div class="metric-value">'+(a.avg_boost||0)+'%</div><div class="metric-label">Avg Boost</div><div class="metric-bar"><div class="metric-bar-fill" style="width:'+(a.avg_boost||0)+'%;background:var(--blue)"></div></div></div><div class="metric-card"><div class="metric-value">'+(a.avg_boost_time||0)+'%</div><div class="metric-label">Time Boosting</div></div><div class="metric-card orange"><div class="metric-value">'+(a.avg_supersonic_time||0)+'%</div><div class="metric-label">Supersonic</div></div><div class="metric-card"><div class="metric-value">'+(a.avg_air_time||0)+'%</div><div class="metric-label">Air Time</div></div></div></div><div class="deep-section"><h3>💥 Combat</h3><div class="deep-metrics"><div class="metric-card green"><div class="metric-value">'+(a.total_demos_given||0)+'</div><div class="metric-label">Demos Given</div></div><div class="metric-card red"><div class="metric-value">'+(a.total_demos_taken||0)+'</div><div class="metric-label">Demos Taken</div></div><div class="metric-card blue"><div class="metric-value">'+(a.total_saves||0)+'</div><div class="metric-label">Saves</div></div><div class="metric-card"><div class="metric-value">'+ot+'</div><div class="metric-label">Overtimes</div></div></div></div><div class="deep-section"><h3>🎮 Ball Control</h3><div class="deep-metrics"><div class="metric-card"><div class="metric-value">'+(a.total_touches||0)+'</div><div class="metric-label">Total Touches</div></div><div class="metric-card"><div class="metric-value">'+(a.total_car_touches||0)+'</div><div class="metric-label">Car Touches</div></div><div class="metric-card"><div class="metric-value">'+(a.total_assists||0)+'</div><div class="metric-label">Assists</div></div><div class="metric-card green"><div class="metric-value">'+(a.total_goals||0)+'</div><div class="metric-label">Total Goals</div></div></div></div>'}catch(e){c.innerHTML='<p style="color:var(--red);text-align:center;padding:12px">Deep stats unavailable</p>'}}

// ====== Match Detail ======
async function toggleMatchDetail(mid,el){const popup=el.querySelector('.match-detail-popup');if(popup.classList.contains('show')){popup.classList.remove('show');popup.innerHTML='';return}popup.classList.add('show');popup.innerHTML='<div class="loading" style="padding:8px"><div class="spinner"></div></div>';try{const r=await api('/api/matches/'+mid);const d=r.details||{};const totalShots=d.shots||0;const userGoals=r.match.user_score||0;const sa=totalShots>0?Math.min(Math.round(userGoals/Math.max(totalShots,1)*100),100):0;let h='';h+='<div class="deep-section"><h3>🎯 Shot Power & Accuracy</h3><div class="deep-metrics">';h+='<div class="metric-card orange"><div class="metric-value">'+(d.fastest_goal_kph>0?d.fastest_goal_kph.toFixed(1)+' km/h':'—')+'</div><div class="metric-label">Fastest Goal</div></div>';h+='<div class="metric-card blue"><div class="metric-value">'+(d.avg_shot_power>0?d.avg_shot_power.toFixed(1)+' km/h':'—')+'</div><div class="metric-label">Avg Shot Power</div></div>';h+='<div class="metric-card green"><div class="metric-value">'+sa+'%</div><div class="metric-label">Shot Accuracy</div><div class="metric-bar"><div class="metric-bar-fill" style="width:'+sa+'%;background:var(--green)"></div></div></div>';h+='<div class="metric-card"><div class="metric-value">'+totalShots+'</div><div class="metric-label">Total Shots</div></div></div></div>';h+='<div class="deep-section"><h3>⛽ Movement & Boost</h3><div class="deep-metrics">';h+='<div class="metric-card blue"><div class="metric-value">'+(d.boost_avg||0).toFixed(1)+'%</div><div class="metric-label">Avg Boost</div><div class="metric-bar"><div class="metric-bar-fill" style="width:'+(d.boost_avg||0).toFixed(1)+'%;background:var(--blue)"></div></div></div>';h+='<div class="metric-card"><div class="metric-value">'+(d.boost_time_pct||0).toFixed(1)+'%</div><div class="metric-label">Time Boosting</div></div>';h+='<div class="metric-card orange"><div class="metric-value">'+(d.supersonic_time_pct||0).toFixed(1)+'%</div><div class="metric-label">Supersonic</div></div>';h+='<div class="metric-card"><div class="metric-value">'+(d.air_time_pct||0).toFixed(1)+'%</div><div class="metric-label">Air Time</div></div></div></div>';h+='<div class="deep-section"><h3>💥 Combat</h3><div class="deep-metrics">';h+='<div class="metric-card green"><div class="metric-value">'+(d.demos_given||0)+'</div><div class="metric-label">Demos Given</div></div>';h+='<div class="metric-card red"><div class="metric-value">'+(d.demos_taken||0)+'</div><div class="metric-label">Demos Taken</div></div>';h+='<div class="metric-card blue"><div class="metric-value">'+(d.saves||0)+'</div><div class="metric-label">Saves</div></div>';h+='<div class="metric-card"><div class="metric-value">'+(d.overtime||0)+'</div><div class="metric-label">Overtime</div></div></div></div>';h+='<div class="deep-section"><h3>🎮 Ball Control</h3><div class="deep-metrics">';h+='<div class="metric-card"><div class="metric-value">'+(d.touches||0)+'</div><div class="metric-label">Total Touches</div></div>';h+='<div class="metric-card"><div class="metric-value">'+(d.car_touches||0)+'</div><div class="metric-label">Car Touches</div></div>';h+='<div class="metric-card"><div class="metric-value">'+(d.assists||0)+'</div><div class="metric-label">Assists</div></div>';h+='<div class="metric-card green"><div class="metric-value">'+userGoals+'</div><div class="metric-label">Your Goals</div></div></div></div>';popup.innerHTML=h}catch(e){popup.innerHTML='<p style="color:var(--red);padding:8px">'+e.message+'</p>'}}

// ====== Listener Status ======
function pollListenerStatus(){api('/api/listener-status').then(s=>{listenerState=s.state;updateListenerUI(s)}).catch(()=>updateListenerUI({state:'not_running'}))}
function updateListenerUI(s){const d=document.getElementById('listener-dot'),m=document.getElementById('listener-msg');d.className='dot';switch(s.state){case'connected':d.classList.add('dot-live');m.textContent='🟢 Live — auto-tracking matches';break;case'connecting':d.classList.add('dot-connecting');m.textContent='🟡 Connecting to RL...';break;case'starting':d.classList.add('dot-connecting');m.textContent='🟡 Starting...';break;case'no_player':d.classList.add('dot-off');m.textContent='⚙️ Player name not set — open Settings';break;case'disconnected':d.classList.add('dot-off');m.textContent='⚫ RL not running (Stats API port 49123 closed)';break;default:d.classList.add('dot-off');m.textContent='Auto-tracker: '+(s.message||s.state||'unknown')}}

// ====== Settings ======
function toggleSettings(){const m=document.getElementById('settings-modal');if(m.style.display==='flex'){m.style.display='none';return}api('/api/config').then(c=>{document.getElementById('cfg-player-name').value=c.name||'';document.getElementById('cfg-friends').value=(c.friends||[]).join('\n')}).catch(()=>{});m.style.display='flex';checkRlConfig()}
async function saveSettings(){const n=document.getElementById('cfg-player-name').value.trim(),fr=document.getElementById('cfg-friends').value.trim(),fs=fr?fr.split('\n').map(f=>f.trim()).filter(Boolean):[];try{await api('/api/config',{method:'POST',body:JSON.stringify({name:n,friends:fs})});showToast('✅ Settings saved! Listener will auto-detect...');toggleSettings();setTimeout(pollListenerStatus,3000)}catch(e){showToast('❌ '+e.message)}}
async function checkRlConfig(){const b=document.getElementById('rl-config-badge'),m=document.getElementById('rl-config-msg');b.textContent='Checking...';try{const s=await api('/api/rl-config');if(!s.config_dir_found){b.textContent='❌ Not Found';m.textContent='RL Config folder not found.'}else if(!s.ini_exists){b.textContent='⚠️ Missing';m.textContent='TAStatsAPI.ini not found. Click Auto-Create.'}else if(!s.ini_correct){b.textContent='⚠️ Wrong';m.textContent='PacketSendRate not 30. Click Auto-Create.'}else{b.textContent='✅ OK';m.textContent='TAStatsAPI.ini is correct!'}}catch(e){b.textContent='❌ Error';m.textContent=e.message}}
async function createRlConfig(){const b=document.getElementById('rl-config-badge'),m=document.getElementById('rl-config-msg');b.textContent='Creating...';try{const r=await api('/api/rl-config',{method:'POST'});if(r.created){b.textContent='✅ Created!';m.textContent='TAStatsAPI.ini created! Restart Rocket League.';showToast('✅ Restart RL!')}else{b.textContent='❌ Failed';m.textContent=r.message}}catch(e){b.textContent='❌ Error';m.textContent=e.message}}

// ====== Exit ======
async function exitTracker(){if(!confirm('Exit RL Tracker?'))return;try{await api('/api/quit',{method:'POST'})}catch(e){}showToast('👋 Tracker shut down.');setTimeout(()=>window.close(),500)}

document.getElementById('settings-modal').addEventListener('click',function(e){if(e.target===this)this.style.display='none'});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('settings-modal').style.display='none'});
loadActiveSession();listenerPollInterval=setInterval(pollListenerStatus,10000);pollListenerStatus();
(async function firstRunCheck(){try{const c=await api('/api/config');if(!c.name)setTimeout(()=>{toggleSettings();showToast('👋 Welcome! Enter your RL nickname.')},1500)}catch(e){setTimeout(()=>showToast('⚠️ Could not connect to server.'),2000)}})();
</script>
</body></html>
